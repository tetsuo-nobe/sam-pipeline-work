AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM Roles for SAM Pipeline
  Creates CodePipeline / CodeBuild / CloudFormation execution roles

Parameters:
  ProjectName:
    Type: String
    Default: sam-app
    Description: Project name used as a prefix for resource names

  Region:
    Type: String
    Default: ap-northeast-1
    Description: Target deployment region

Resources:
  # ============================================================
  # CodePipeline Service Role
  # ============================================================
  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Access to CodeCommit source repository
              - Effect: Allow
                Action:
                  - codecommit:GetBranch
                  - codecommit:GetCommit
                  - codecommit:UploadArchive
                  - codecommit:GetUploadArchiveStatus
                  - codecommit:CancelUploadArchive
                Resource: !Sub arn:aws:codecommit:${Region}:${AWS::AccountId}:*
              # Access CodeStar Connections (GitHub, GitLab, Bitbucket, etc.)
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Sub arn:aws:codestar-connections:${Region}:${AWS::AccountId}:connection/*
              # Access to artifact S3 bucket
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: '*'
              # Start and monitor CodeBuild builds
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: '*'
              # CloudFormation deploy actions
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:UpdateStack
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:SetStackPolicy
                  - cloudformation:ValidateTemplate
                Resource: '*'
              # PassRole for CloudFormation execution role
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt CloudFormationExecutionRole.Arn

  # ============================================================
  # CodeBuild Service Role
  # ============================================================
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Write to CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              # Access to CodeCommit source repository
              - Effect: Allow
                Action:
                  - codecommit:GitPull
                Resource: !Sub arn:aws:codecommit:${Region}:${AWS::AccountId}:*
              # Access to artifact S3 bucket
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource: '*'
              # Access CodeStar Connections (GitHub, GitLab, Bitbucket, etc.)
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                  - codestar-connections:GetConnection
                  - codestar-connections:ListConnections
                  - codestar-connections:PassConnection
                  - codeconnections:UseConnection
                  - codeconnections:GetConnection
                  - codeconnections:ListConnections
                  - codeconnections:PassConnection
                Resource:
                  - !Sub arn:aws:codestar-connections:${Region}:${AWS::AccountId}:connection/*
                  - !Sub arn:aws:codeconnections:${Region}:${AWS::AccountId}:connection/*
              # Create SAM managed stack for --resolve-s3
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                Resource:
                  - !Sub arn:aws:cloudformation:${Region}:${AWS::AccountId}:stack/aws-sam-cli-managed-default/*
              # Create and access SAM managed S3 bucket
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:PutBucketPolicy
                  - s3:PutBucketVersioning
                  - s3:PutEncryptionConfiguration
                  - s3:GetBucketPolicy
                  - s3:GetEncryptionConfiguration
                  - s3:PutBucketTagging
                Resource: !Sub arn:aws:s3:::aws-sam-cli-managed-default-samclisourcebucket-*

  # ============================================================
  # CloudFormation Execution Role
  # ============================================================
  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-cloudformation-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudFormationExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Manage Lambda functions
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:ListTags
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:PublishVersion
                  - lambda:CreateAlias
                  - lambda:DeleteAlias
                  - lambda:UpdateAlias
                Resource: '*'
              # Manage IAM roles for Lambda execution
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                Resource: '*'
              # Manage API Gateway
              - Effect: Allow
                Action:
                  - apigateway:GET
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:DELETE
                  - apigateway:PATCH
                Resource: '*'
              # CloudFormation stack operations
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                Resource: '*'
              # S3 access for deployment packages
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: '*'
              # CodeDeploy for future Blue/Green deployment
              - Effect: Allow
                Action:
                  - codedeploy:CreateApplication
                  - codedeploy:CreateDeployment
                  - codedeploy:CreateDeploymentGroup
                  - codedeploy:DeleteApplication
                  - codedeploy:DeleteDeploymentGroup
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:RegisterApplicationRevision
                Resource: '*'

Outputs:
  CodePipelineServiceRoleArn:
    Description: CodePipeline service role ARN
    Value: !GetAtt CodePipelineServiceRole.Arn
    Export:
      Name: !Sub ${ProjectName}-codepipeline-role-arn

  CodeBuildServiceRoleArn:
    Description: CodeBuild service role ARN
    Value: !GetAtt CodeBuildServiceRole.Arn
    Export:
      Name: !Sub ${ProjectName}-codebuild-role-arn

  CloudFormationExecutionRoleArn:
    Description: CloudFormation execution role ARN
    Value: !GetAtt CloudFormationExecutionRole.Arn
    Export:
      Name: !Sub ${ProjectName}-cloudformation-role-arn
